[build]
builder = "nixpacks"

[deploy]
# Start sequence (see litestream.yml for context):
#   1. Make sure the volume dirs exist (first deploy after volume creation).
#   2. Restore both DBs from R2 if-replica-exists (no-op if the volume
#      already has them, recovers them if the volume was wiped, and skipped
#      cleanly when the R2 env vars aren't set yet — `|| true`).
#   3. Exec the app under litestream's supervision so every write is
#      streamed to R2 in near-real-time.
# The trailing `exec` matters: litestream then becomes PID 1's child and
# Railway's restart policy applies to the app process correctly.
#
# Python binary path note (2026-05-27): Nixpacks installs its venv at
# /opt/venv (not /app/.venv); `uv sync` then inherits VIRTUAL_ENV and
# installs into that. litestream's `-exec` runs via os.exec (no shell,
# no /root/.profile sourcing), so the absolute path matters.
startCommand = "mkdir -p /app/data/parses && (litestream restore -if-replica-exists -config /app/litestream.yml /app/data/users.db || true) && (litestream restore -if-replica-exists -config /app/litestream.yml /app/data/parses/parses.db || true) && exec litestream replicate -config /app/litestream.yml -exec '/opt/venv/bin/python main.py'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
watchPaths = ["**", "!alloy/**", "!grafana/**"]
