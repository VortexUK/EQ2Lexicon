# Node is provisioned via fnm, NOT the nodejs_22 Nix package: Vite 8 / rolldown
# require Node >=22.12 (or >=20.19), but nixpacks' pinned nixpkgs resolves
# nodejs_22 to 22.10.0 — and that revision predates Node 24, so nodejs_24 isn't
# available either. fnm installs an exact, new-enough Node at build time (and
# its bundled npm avoids the optional-dependencies bug, npm/cli#4828, that
# dropped the @rolldown/binding-linux-x64-gnu native binary on older npm).
#
# fnm's install dir is passed as an explicit `--fnm-dir /opt/fnm` on every
# invocation rather than via the FNM_DIR env var: Railway injects service
# variables as Docker build ARGs, and an empty `ARG FNM_DIR` clobbers any
# `ENV FNM_DIR` we'd set — leaving fnm with an empty base dir, which fnm 1.37.2
# rejects ("a value is required for '--fnm-dir'", exit 2). The explicit flag
# can't be clobbered. The fixed dir also lets the build phase find the Node the
# install phase installed (phases are separate shells; the dir persists on the
# image filesystem).
[phases.setup]
# litestream ships the binary used in the startCommand to back up parses.db +
# users.db to Cloudflare R2.
nixPkgs = ["python313Full", "fnm", "uv", "litestream"]

[phases.install]
cmds = [
  # uv is provided by Nix (see nixPkgs). Nix's python store is immutable, so
  # we can't bootstrap pip into it (PEP 668) — installing uv as a Nix package
  # sidesteps that and gives us the binary directly.
  # --frozen: error if lockfile is out of date (catches missing `uv lock` commits)
  # --no-dev: skip the dev dependency-group (ruff, pyright, pytest)
  "uv sync --frozen --no-dev --python python3.13",
  # Install the latest Node 22.x (>=22.12) and run a clean, lockfile-exact npm
  # install under it. `fnm exec --using=22` activates that version for the
  # command without needing shell integration.
  "mkdir -p /opt/fnm && fnm --fnm-dir /opt/fnm install 22 && cd frontend && fnm --fnm-dir /opt/fnm exec --using=22 npm ci"
]

[phases.build]
cmds = [
  "cd frontend && fnm --fnm-dir /opt/fnm exec --using=22 npm run build"
]

# [start].cmd here is only used when railway.toml's startCommand is NOT set
# — railway.toml takes precedence and currently runs the app under
# litestream supervision. We still wire this up as a sensible fallback for
# `nixpacks build && docker run` style usage by routing through a login
# shell so the PATH set on /root/.profile (which Nixpacks populates with
# the venv's bin dir) is honoured regardless of where Nixpacks chose to
# place the venv this build.
[start]
cmd = "bash -lc 'exec python main.py'"
