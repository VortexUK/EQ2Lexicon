[phases.setup]
nixPkgs = ["python311Full", "nodejs_20"]

[phases.install]
cmds = [
  "python3.11 -m ensurepip --upgrade --break-system-packages",
  "python3.11 -m pip install -r requirements.txt --break-system-packages",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "python main.py"
