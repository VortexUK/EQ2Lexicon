[phases.setup]
# `litestream` ships the binary we use in the startCommand to back up
# parses.db + users.db to Cloudflare R2.
nixPkgs = ["python313Full", "nodejs_20", "uv", "litestream"]

[phases.install]
cmds = [
  # uv is provided by Nix (see nixPkgs). Nix's python store is immutable, so
  # we can't bootstrap pip into it (PEP 668) — installing uv as a Nix package
  # sidesteps that and gives us the binary directly.
  # --frozen: error if lockfile is out of date (catches missing `uv lock` commits)
  # --no-dev: skip the dev dependency-group (ruff, pyright, pytest)
  "uv sync --frozen --no-dev --python python3.13",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

# [start].cmd here is only used when railway.toml's startCommand is NOT set
# — railway.toml takes precedence and currently runs the app under
# litestream supervision. We still wire this up as a sensible fallback for
# `nixpacks build && docker run` style usage by routing through a login
# shell so the PATH set on /root/.profile (which Nixpacks populates with
# the venv's bin dir) is honoured regardless of where Nixpacks chose to
# place the venv this build.
[start]
cmd = "bash -lc 'exec python main.py'"
