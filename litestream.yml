# Litestream — continuous replication of the SQLite DBs to Cloudflare R2.
#
# Four databases are backed up: the parses corpus (parses.db), the
# Discord/claims/api_tokens store (users.db), the zone/boss-roster
# catalogue (zones.db), and the raid strategy/timers store
# (raids.db — strategy markdown is hand-edited and revision-tracked, so
# losing it on a volume wipe would erase audit history).
#
# PATHS MUST MATCH THE APP'S DB_*_PATH RESOLUTION. The app reads
# DB_USERS_PATH / DB_PARSES_PATH / DB_ZONES_PATH / DB_RAIDS_PATH at
# import time (backend/eq2db/raids.py + backend/server/parses/db.py +
# backend/server/db/) and uses
# those for every read and write. This file MUST reference the same
# files via the same env vars — otherwise litestream watches one path
# while the app writes to another, the configured-but-nonexistent file
# never appears, and the R2 bucket stays empty.
#
# Configuration via env vars (set in Railway → Variables):
#   DB_USERS_PATH       /data/users.db (or wherever the volume is mounted)
#   DB_PARSES_PATH      /data/parses.db
#   DB_ZONES_PATH       /data/zones.db
#   DB_RAIDS_PATH       /data/raids.db
#   R2_ENDPOINT          https://<account>.r2.cloudflarestorage.com
#   R2_BUCKET            e.g. eq2lexicon-backups
#   R2_ACCESS_KEY_ID     R2 API token "Access Key ID"
#   R2_SECRET_ACCESS_KEY R2 API token "Secret Access Key"
#
# Recovery: on container start, railway.toml's startCommand first runs
# `litestream restore -if-replica-exists` for each DB, so a wiped volume
# auto-reseeds from R2 before the app starts. After that the long-running
# `litestream replicate` keeps all four DBs in sync (RPO ~10 s).

dbs:
  # NOTE on env-var syntax: litestream uses Go's os.ExpandEnv, which only
  # supports `${VAR}` — NOT `${VAR:-default}`. Bash-style defaults parse as
  # a single (nonexistent) env-var name and substitute to empty string,
  # which leaves the path empty and litestream then tries to open `/app`
  # (the cwd) as a database. So: no defaults here. The env vars MUST be
  # set on the Railway service (see CLAUDE.md → Environment variables).
  - path: ${DB_PARSES_PATH}
    replicas:
      - type: s3
        endpoint: ${R2_ENDPOINT}
        bucket: ${R2_BUCKET}
        path: parses
        access-key-id: ${R2_ACCESS_KEY_ID}
        secret-access-key: ${R2_SECRET_ACCESS_KEY}
        region: auto
        # Keep ~7 days of recoverable history; older snapshots GC'd.
        retention: 168h
        retention-check-interval: 24h
        snapshot-interval: 24h

  - path: ${DB_USERS_PATH}
    replicas:
      - type: s3
        endpoint: ${R2_ENDPOINT}
        bucket: ${R2_BUCKET}
        path: users
        access-key-id: ${R2_ACCESS_KEY_ID}
        secret-access-key: ${R2_SECRET_ACCESS_KEY}
        region: auto
        retention: 168h
        retention-check-interval: 24h
        snapshot-interval: 24h

  - path: ${DB_ZONES_PATH}
    replicas:
      - type: s3
        endpoint: ${R2_ENDPOINT}
        bucket: ${R2_BUCKET}
        path: zones
        access-key-id: ${R2_ACCESS_KEY_ID}
        secret-access-key: ${R2_SECRET_ACCESS_KEY}
        region: auto
        retention: 168h
        retention-check-interval: 24h
        snapshot-interval: 24h

  - path: ${DB_RAIDS_PATH}
    replicas:
      - type: s3
        endpoint: ${R2_ENDPOINT}
        bucket: ${R2_BUCKET}
        path: raids
        access-key-id: ${R2_ACCESS_KEY_ID}
        secret-access-key: ${R2_SECRET_ACCESS_KEY}
        region: auto
        retention: 168h
        retention-check-interval: 24h
        snapshot-interval: 24h
