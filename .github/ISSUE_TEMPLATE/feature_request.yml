name: Feature request
description: Propose a new feature or an improvement to an existing one.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check [open issues](https://github.com/VortexUK/EQ2Lexicon/issues?q=is%3Aissue) first — it might already be tracked.

        For non-trivial changes, expect a conversation about scope before code lands. See [CONTRIBUTING.md](https://github.com/VortexUK/EQ2Lexicon/blob/main/CONTRIBUTING.md).

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation that prompted this. "When I do X, I can't see Y" beats "add a Y button".
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: What change would solve it? Be as specific as you can.
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Which part of the project?
      multiple: true
      options:
        - Website (frontend)
        - Web API (backend)
        - Discord bot
        - Parses
        - ACT plugin (different repo)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why this one is better.
    validations:
      required: false
