name: CodeQL

# GitHub-native semantic security scanning for the Python backend and
# the TypeScript/JavaScript frontend. Runs on every push + PR to main,
# plus a weekly schedule so newly-published CodeQL rules catch existing
# code. Findings appear under the repo Security tab. Complements the
# Dependabot CVE flow (which covers dependencies, not our own code).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays at 06:00 UTC.
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-extended = the broader security ruleset without the
          # quality/style noise. Both languages here are interpreted, so
          # CodeQL uses its no-build extraction — no compile step needed.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
